name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # Manual testing without tags

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git gtk3 alsa-lib libxkbcommon libxkbcommon-x11 xdotool clang pkgconf

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --package dicto

      - name: Package release tarball
        run: |
          mkdir -p dist
          cp target/release/dicto dist/
          cp packaging/arch/dicto.desktop dist/
          cp assets/icon.svg dist/
          cp LICENSE dist/
          cd dist
          tar czf ../dicto-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz \
            dicto dicto.desktop icon.svg LICENSE

      - uses: actions/upload-artifact@v4
        with:
          name: dicto-x86_64
          path: dicto-*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows executable (release)
        run: cargo build --release --package dicto

      - name: Create portable package
        run: |
          mkdir portable
          copy target\release\dicto.exe portable\
          copy LICENSE portable\
          copy README.md portable\
          Compress-Archive -Path portable\* -DestinationPath dicto-${{ github.ref_name }}-windows-x86_64-portable.zip

      - name: Create Inno Setup installer
        run: iscc packaging\windows\installer.iss /DAppVersion=${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: dicto-windows
          path: |
            dicto-*-windows-x86_64-portable.zip
            Output/*.exe

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*