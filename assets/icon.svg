<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Dicto">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#414868"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="100%" stop-color="#dde3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- stacked page edges (depth) -->
  <rect x="34" y="16" width="68" height="84" rx="6" fill="#7aa2f7" opacity="0.35"/>
  <rect x="30" y="20" width="70" height="84" rx="6" fill="#7aa2f7" opacity="0.55"/>

  <!-- front card -->
  <rect x="26" y="24" width="72" height="84" rx="6" fill="url(#card)" filter="url(#shadow)"/>

  <!-- bold "A" (dictionary mark) -->
  <path d="M 38 84 L 52 38 L 62 38 L 76 84 L 67 84 L 64 72 L 50 72 L 47 84 Z
           M 52 64 L 62 64 L 57 48 Z"
        fill="#1a1b26" fill-rule="evenodd"/>

  <!-- phonetic / definition lines -->
  <line x1="38" y1="94" x2="86" y2="94" stroke="#7aa2f7" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="102" x2="70" y2="102" stroke="#7aa2f7" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
</svg>
